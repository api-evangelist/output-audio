aid: output-audio
name: Output
description: >-
  Output is a Los Angeles-based music software company founded in 2013 by
  composer and CEO Gregg Lehrman that makes creative virtual instruments,
  audio effects, and a cloud-connected subscription platform for music
  producers, songwriters, composers, and beatmakers. Its flagship product is
  Arcade, a cloud-powered playable sampler and instruments plugin whose
  library of vocal chops, chords, melodies, basslines, loops, samples, and
  chromatic instruments (organized into product lines such as Hooked,
  Poolside, and Drip) refreshes daily. Output's catalog also includes
  Co-Producer, a sample-discovery plugin that finds samples that fit the
  current project, and the Output FX suite — Portal (granular synthesis
  engine), Thermal (interactive distortion engine), and Movement (rhythm
  engine) — alongside legacy Kontakt-based instruments such as Exhale,
  Analog Brass & Strings, REV, Signal, and Substance. Products are sold as
  one-time perpetual licenses and bundled in the Output One subscription
  ($14.99/month or $119.99/year) covering Arcade, Co-Producer, and the
  three FX plugins with all expansion packs included. Output raised a $45M
  Series A from Summit Partners in 2020. Products are delivered as VST3,
  AU, and AAX plugins (Arcade also runs as a standalone desktop app)
  installed via account.output.com and the Output Hub; there is no public
  REST API, SDK, or developer program — integration is through the
  industry-standard DAW plugin formats.
